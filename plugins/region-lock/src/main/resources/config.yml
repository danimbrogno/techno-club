# Master switch. When false, no zones are enforced (same as /regionlock off).
enabled: true

# Shown when entering a locked zone, and when trying to place/break inside one.
# Set to "" to silence.
deny-message: "You may not break or place blocks here"

# Shown when leaving a locked zone. Set to "" to silence.
leave-message: "You left the locked area."

# Named axis-aligned boxes. Corner order does not matter; bounds are inclusive.
# IMPORTANT: deploy only copies the plugin JAR. Edit this file on the server at
# plugins/RegionLock/config.yml, then /regionlock reload (or restart).
# Per-zone enabled defaults to true; toggle with /regionlock on|off|toggle <zone>
zones:
  technoclubhouse:
    enabled: true
    world: world
    min: { x: -471, y: -64, z: 2941 }
    max: { x: -450, y: 320, z: 2951 }
